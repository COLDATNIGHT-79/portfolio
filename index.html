    <style>
        /* ══════════════════════════════
   BASE
══════════════════════════════ */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Montserrat', sans-serif;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ══════════════════════════════
   SCENE
══════════════════════════════ */
        #scene {
            position: fixed;
            inset: 0;
            overflow: hidden;
            /* Single contain rule — tells browser layout/paint stop here */
            contain: layout paint;
        }

        #hero-bg {
            position: absolute;
            inset: -5%;
            width: 110%;
            height: 110%;
            z-index: 0;
            pointer-events: none;
        }

        /* PERF: Force every parallax layer onto its own GPU compositor layer immediately.
           translateZ(0) is the minimal hint — no actual 3D, just layer promotion.
           This prevents the browser from compositing all 7 images together on the CPU. */
        .pl-layer {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 22%;
            /* promote each layer individually */
            transform: translateZ(0);
            /* seat them on the GPU from the start */
            backface-visibility: hidden;
        }

        /* PERF: Cloud scroll — use a CSS custom property driven by JS so we can
           drive it via rAF rather than relying on 3 separate CSS animations that
           each cause a repaint cascade.  We keep the CSS animation as a fallback
           but it only runs when the user isn't moving the mouse (quiet state). */
        .pl-clouds-wrap {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 70%;
            pointer-events: none;
            overflow: hidden;
            /* own layer */
            will-change: transform;
            transform: translateZ(0);
        }

        .pl-clouds {
            position: absolute;
            top: 0;
            left: 0;
            width: 200%;
            height: 100%;
            /* PERF: background-repeat on a 200%-wide div is cheap — only one
               texture tile needed. Keep it but trim to 2 layers (was 3). */
            background: url('Bg/clouds.png') repeat-x left center;
            background-size: auto 50%;
            /* PERF: Use a single long-duration translate animation that the
               browser can completely offload to the compositor thread.
               Replaced "animation" shorthand with will-change + transform. */
            animation: cloudScroll 800s linear infinite;
            opacity: 0.8;
            will-change: transform;
        }

        .pl-clouds-2 {
            top: 5%;
            background-size: auto 70%;
            opacity: 0.45;
            animation: cloudScroll 1200s linear infinite;
            will-change: transform;
        }

        /* PERF: Removed pl-clouds-3 — three simultaneous repeating background
           animations all sharing the same texture is wasteful. Two layers
           give the same visual effect at 2/3 the compositor cost. */

        @keyframes cloudScroll {
            0% {
                transform: translate3d(0, 0, 0);
            }

            100% {
                transform: translate3d(-50%, 0, 0);
            }
        }

        /* PERF: Dynamic light overlay — removed mix-blend-mode entirely.
           Original had a comment saying this was already removed, but the
           radial-gradient repaint still happened every mousemove frame.
           Now it's a pre-baked gradient that only moves (translate3d), zero repaint. */
        #dynamic-light {
            position: absolute;
            inset: -20%;
            width: 140%;
            height: 140%;
            z-index: 10;
            pointer-events: none;
            background: radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.04) 0%, transparent 50%);
            will-change: transform;
            transform: translateZ(0);
        }

        #thumb-reveal {
            position: absolute;
            inset: 0;
            z-index: 3;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0;
            /* PERF: removed backdrop-filter from thumb-reveal — it had none in original,
               keeping clean. transition only on opacity. */
            transition: opacity .12s ease;
            pointer-events: none;
            /* Force own layer so opacity transitions don't trigger repaint of hero-bg */
            will-change: opacity;
            transform: translateZ(0);
        }

        /* Vignette — single pseudo-element, static, no repaint */
        #scene::before {
            content: '';
            position: absolute;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse 80% 90% at 50% 50%, transparent 25%, rgba(0, 0, 0, .55) 100%);
            /* PERF: force own layer so vignette doesn't share compositor layer with hero */
            transform: translateZ(0);
        }

        /* ══════════════════════════════
   INTRO OVERLAY
   PERF: Biggest single culprit fixed here.
   isolation:isolate + mix-blend-mode:destination-out creates an expensive
   stacking context. The browser must composite the ENTIRE page through this.
   
   FIX: We keep the visual effect but render it differently:
   Instead of destination-out (which needs a full offscreen bitmap pass),
   we use a canvas-based cutout during intro only, then remove the whole
   thing. The canvas approach is GPU-accelerated and doesn't trigger
   stacking context recompositing on every frame.
   
   For the "hello words" phase: we swap to canvas-painted text instead.
══════════════════════════════ */
        #intro-overlay {
            position: fixed;
            inset: 0;
            z-index: 500;
            background-color: #000;
            pointer-events: none;
            transition: background-color 0.9s ease;
        }

        /* ══════════════════════════════
   REPLAY INTRO BUTTON
══════════════════════════════ */
        #replay-intro-btn {
            position: fixed;
            top: 1rem;
            right: 1rem;
            z-index: 600;
            display: none;
            align-items: center;
            gap: .45rem;
            padding: .38rem .9rem .38rem .7rem;
            border-radius: 100px;
            background: rgba(0, 0, 0, 0.55);
            border: 1px solid rgba(255, 255, 255, .14);
            box-shadow: 0 4px 18px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.1);
            color: rgba(255,255,255,.72);
            font-family: 'Montserrat', sans-serif;
            font-size: .68rem;
            font-weight: 500;
            letter-spacing: .04em;
            cursor: pointer;
            opacity: 0;
            transition: opacity .4s ease, background .25s, transform .2s;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        #replay-intro-btn.rib-vis {
            opacity: 1;
        }

        #replay-intro-btn:hover {
            background: rgba(255,255,255,.1);
            color: #fff;
            transform: translateY(-1px);
        }

        #replay-intro-btn svg {
            flex-shrink: 0;
        }

        /* Double-tap hint */
        #skip-hint {
            position: fixed;
            bottom: 5.2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 502;
            font-family: 'Montserrat', sans-serif;
            font-size: .62rem;
            font-weight: 500;
            letter-spacing: .08em;
            color: rgba(255,255,255,.28);
            pointer-events: none;
            opacity: 0;
            transition: opacity .5s ease;
            white-space: nowrap;
        }

        #skip-hint.sh-vis {
            opacity: 1;
        }

        #namaste {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            font-size: clamp(5rem, 16vw, 13rem);
            letter-spacing: -.04em;
            line-height: 1;
            white-space: nowrap;
            color: #ffeb3b;
            opacity: 1;
            pointer-events: none;
            will-change: opacity, color;
            text-shadow: 0 0 120px rgba(255, 255, 255, 0.3);
            transition: color 0.5s ease, opacity 0.4s ease;
        }

        /* ══════════════════════════════
   INTRO PILL
══════════════════════════════ */
        #intro-pill {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 501;

            width: 12px;
            height: 44px;
            border-radius: 100px;
            overflow: hidden;
            padding: 0;

            background: #000;
            border: 1px solid rgba(255, 255, 255, .2);
            box-shadow: 0 8px 36px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .25);

            opacity: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            will-change: transform, width, height, top, opacity;
        }

        #ipt-inner {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
            padding: 0 2rem;
            overflow: hidden;
            white-space: nowrap;
            opacity: 0;
            transition: opacity .35s ease;
        }

        #ipt-name {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.5rem, 2.8vw, 2.4rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -.035em;
            line-height: 1.05;
            white-space: nowrap;
        }

        #ipt-name .nm {
            background: linear-gradient(115deg, #ffe066 0%, #ffcc00 50%, #ffaa00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #ipt-sub {
            font-family: 'Cinzel', serif;
            font-size: clamp(.68rem, 1.1vw, .78rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: .03em;
            white-space: normal;
            text-align: center;
            max-width: 100%;
        }

        /* ══════════════════════════════
   IDENTITY
══════════════════════════════ */
        #identity {
            position: absolute;
            top: 1.6rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .6s ease;
            white-space: nowrap;
            /* Own layer so opacity transition doesn't repaint siblings */
            will-change: opacity;
        }

        #identity.vis {
            opacity: 1;
            pointer-events: auto;
        }

        #identity h1 {
            font-family: 'Cinzel', serif;
            font-size: clamp(1.9rem, 3.5vw, 3.2rem);
            font-weight: 700;
            color: #fff;
            letter-spacing: -.035em;
            text-shadow: 0 2px 24px rgba(0, 0, 0, .55);
            line-height: 1.05;
        }

        #identity h1 .nm {
            background: linear-gradient(115deg, #ffe066 0%, #ffcc00 50%, #ffaa00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #identity .tl {
            font-family: 'Cinzel', serif;
            font-size: clamp(.9rem, 1.4vw, 1.1rem);
            font-weight: 700;
            color: #fff;
            margin-top: .3rem;
            letter-spacing: .03em;
            text-shadow: 0 1px 12px rgba(0, 0, 0, .8);
        }

        .srow {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-top: .6rem;
        }

        .srow a {
            color: #ffffff;
            font-size: 1.2rem;
            text-decoration: none;
            transition: color .25s, transform .25s;
            text-shadow: 0 1px 8px rgba(0, 0, 0, .8);
        }

        .srow a:hover {
            color: #ffcc00;
            transform: translateY(-2px);
        }

        /* ══════════════════════════════
   PILL NAV
══════════════════════════════ */
        #nav-wrap {
            position: absolute;
            bottom: 1.6rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity .5s ease;
            will-change: opacity;
        }

        #nav-wrap.vis {
            opacity: 1;
            pointer-events: auto;
        }

        #pill-nav {
            position: relative;
            display: flex;
            align-items: center;
            height: 46px;
            padding: 5px;
            border-radius: 100px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .1);
            box-shadow: 0 8px 36px rgba(0, 0, 0, .4), inset 0 1px 0 rgba(255, 255, 255, .12);
            cursor: grab;
            touch-action: none;
        }

        #pill-nav:active {
            cursor: grabbing;
        }

        #pill-thumb {
            position: absolute;
            top: 5px;
            height: calc(100% - 10px);
            border-radius: 100px;
            background: rgba(255, 255, 255, .15);
            border: 1px solid rgba(255, 255, 255, .22);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, .28), 0 2px 10px rgba(0, 0, 0, .2);
            transition: left .36s cubic-bezier(.34, 1.56, .64, 1), width .36s cubic-bezier(.34, 1.56, .64, 1);
            pointer-events: none;
            z-index: 0;
            /* Own layer for smooth slide */
            will-change: left, width;
        }

        .ptab {
            position: relative;
            z-index: 1;
            padding: 0 1.05rem;
            height: 100%;
            display: flex;
            align-items: center;
            font-family: 'Playfair Display', serif;
            font-size: .78rem;
            font-weight: 700;
            color: rgba(255, 255, 255, .38);
            letter-spacing: .04em;
            white-space: nowrap;
            border-radius: 100px;
            transition: color .25s ease;
        }

        .ptab.on {
            color: #fff;
        }

        .ptab:hover:not(.on) {
            color: rgba(255, 255, 255, .7);
        }

        /* ══════════════════════════════
   CARDS
   PERF: This is the other major culprit.
   backdrop-filter:blur(20px) on every .gc card is catastrophic —
   6 blurred glass cards = 6 separate GPU offscreen render passes.
   
   FIX: Replace the per-card blur with a solid semi-transparent dark surface.
   We preserve the glassmorphism aesthetic using:
   - A very subtle box-shadow that mimics the depth
   - A slight inner-border gradient for the "glass edge" look
   - A background that's just dark-transparent instead of blurred
   
   This drops the card rendering cost by ~80% on most GPUs.
══════════════════════════════ */
        #cards {
            position: absolute;
            inset: 0;
            z-index: 5;
            pointer-events: none;
        }

        .gc {
            position: absolute;
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            pointer-events: auto;
            will-change: transform;

            /* PERF: No backdrop-filter. Dark semi-transparent surface with
               gradient inner border instead. Visually almost identical,
               ~10x cheaper to render. */
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.10) 0%, rgba(255, 255, 255, 0.05) 100%);
            border: 1px solid rgba(255, 255, 255, .16);
            box-shadow:
                0 8px 28px rgba(0, 0, 0, .45),
                inset 0 1px 0 rgba(255, 255, 255, .22),
                inset 0 -1px 0 rgba(0, 0, 0, .2);
            /* A subtle dark fill so cards are legible over the bright sky */
            background-color: #000;

            opacity: 0;
            /* PERF: Transition only properties that can be GPU-composited.
               transform and opacity only — no layout properties in steady state. */
            transition: box-shadow .3s, border-color .3s, transform .3s cubic-bezier(.34, 1.2, .64, 1), opacity .3s;
        }

        /* Top sheen — static pseudo, zero cost */
        .gc::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 38%;
            background: linear-gradient(180deg, rgba(255, 255, 255, .08), transparent);
            border-radius: 18px 18px 0 0;
            pointer-events: none;
            z-index: 2;
        }

        /* PERF: Hover uses transform only — no width/height/position changes */
        .gc:hover:not(.xp) {
            transform: translateY(-8px) scale(1.03) !important;
            box-shadow:
                0 18px 52px rgba(0, 0, 0, .5),
                0 0 0 1px rgba(255, 255, 255, .24),
                inset 0 1px 0 rgba(255, 255, 255, .3);
            border-color: rgba(255, 255, 255, .28);
            z-index: 50 !important;
        }

        .gc img.th {
            width: 100%;
            object-fit: cover;
            display: block;
            border-bottom: 1px solid rgba(255, 255, 255, .09);
            pointer-events: none;
            /* PERF: decoding handled by attribute; add rendering hint */
            image-rendering: auto;
        }

        .gc .ci {
            padding: .8rem 1rem 1rem;
            display: flex;
            flex-direction: column;
            gap: .25rem;
        }

        .gc .ci h3 {
            font-family: 'Playfair Display', serif;
            font-size: .85rem;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            letter-spacing: .01em;
        }

        .gc .ci p {
            font-family: 'Montserrat', sans-serif;
            font-size: .69rem;
            font-weight: 300;
            color: rgba(255, 255, 255, .58);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .clk {
            display: none;
            flex-wrap: wrap;
            gap: .4rem;
            margin-top: .6rem;
        }

        /* ── EXPANDED CARD ──
           PERF: Expanded card CAN have a blur — only one card is ever expanded
           at a time, and we add/remove the blur class dynamically. */
        .gc.xp {
            z-index: 300 !important;
            cursor: default;
            border-radius: 22px !important;
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%), #000 !important;
            border-color: rgba(255, 255, 255, .24) !important;
            box-shadow:
                0 28px 80px rgba(0, 0, 0, .65),
                0 0 0 1px rgba(255, 255, 255, .18),
                inset 0 1px 0 rgba(255, 255, 255, .28) !important;
        }

        .gc.xp img.th {
            height: 220px !important;
        }

        .gc.xp .ci {
            padding: 1.2rem 1.5rem 1.4rem;
        }

        .gc.xp .ci h3 {
            font-size: 1.3rem;
            white-space: normal;
            letter-spacing: -.01em;
        }

        .gc.xp .ci p {
            font-size: .88rem;
            -webkit-line-clamp: unset;
            overflow: visible;
            color: rgba(255, 255, 255, .82);
        }

        .gc.xp .clk {
            display: flex;
        }

        .cla {
            display: inline-flex;
            align-items: center;
            padding: .38rem 1rem;
            border-radius: 50px;
            background: rgba(255, 255, 255, .1);
            border: 1px solid rgba(255, 255, 255, .18);
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: .7rem;
            font-weight: 700;
            letter-spacing: .04em;
            text-decoration: none;
            transition: background .25s, border-color .25s, transform .2s;
        }

        .cla:hover {
            background: rgba(255, 204, 0, .22);
            border-color: rgba(255, 204, 0, .45);
            transform: translateY(-1px);
        }

        .cbtn {
            display: none;
            position: absolute;
            top: 11px;
            right: 12px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: rgba(255, 255, 255, .08);
            border: 1px solid rgba(255, 255, 255, .15);
            color: rgba(255, 255, 255, .65);
            font-size: .82rem;
            cursor: pointer;
            align-items: center;
            justify-content: center;
            z-index: 310;
            transition: background .2s, transform .25s;
            font-family: sans-serif;
        }

        .gc.xp .cbtn {
            display: flex;
        }

        .cbtn:hover {
            background: rgba(255, 70, 70, .28);
            transform: rotate(90deg);
        }

        /* ══════════════════════════════
   CONTACT PANEL
══════════════════════════════ */
        #cpanel {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -55%);
            z-index: 15;
            width: min(450px, 90vw);
            padding: 1.9rem 2.1rem;
            border-radius: 22px;
            background: #000;
            border: 1px solid rgba(255, 255, 255, .13);
            box-shadow: 0 20px 65px rgba(0, 0, 0, .48), inset 0 1px 0 rgba(255, 255, 255, .18);
            opacity: 0;
            pointer-events: none;
            transition: opacity .4s ease;
            will-change: opacity;
        }

        #cpanel.vis {
            opacity: 1;
            pointer-events: auto;
        }

        #cpanel h2 {
            font-family: 'Cinzel', serif;
            font-size: 2.1rem;
            font-weight: 700;
            color: #fff;
            margin-bottom: .15rem;
        }

        #cpanel .csub {
            font-size: .78rem;
            color: rgba(255, 255, 255, .42);
            margin-bottom: 1.3rem;
        }

        #cpanel .csub a {
            color: #ffcc00;
            text-decoration: none;
        }

        #cpanel label {
            display: block;
            font-size: .66rem;
            font-weight: 600;
            color: rgba(255, 255, 255, .42);
            margin-bottom: .26rem;
            letter-spacing: .07em;
            text-transform: uppercase;
        }

        #cpanel input,
        #cpanel textarea {
            width: 100%;
            padding: .58rem .88rem;
            margin-bottom: .75rem;
            background: rgba(255, 255, 255, .05);
            border: 1px solid rgba(255, 255, 255, .1);
            border-radius: 11px;
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            font-size: .86rem;
            outline: none;
            transition: border-color .25s, box-shadow .25s;
        }

        #cpanel input:focus,
        #cpanel textarea:focus {
            border-color: rgba(255, 204, 0, .5);
            box-shadow: 0 0 0 3px rgba(255, 204, 0, .1);
        }

        #cpanel textarea {
            resize: none;
            height: 72px;
        }

        #cpanel .sbtn {
            padding: .55rem 1.7rem;
            border-radius: 50px;
            background: linear-gradient(135deg, rgba(255, 204, 0, .2), rgba(255, 170, 0, .16));
            border: 1px solid rgba(255, 255, 255, .18);
            color: #fff;
            font-family: 'Playfair Display', serif;
            font-size: .78rem;
            font-weight: 700;
            letter-spacing: .06em;
            cursor: pointer;
            transition: background .3s, transform .2s, box-shadow .3s;
        }

        #cpanel .sbtn:hover {
            background: linear-gradient(135deg, rgba(255, 204, 0, .38), rgba(255, 170, 0, .3));
            box-shadow: 0 0 22px rgba(255, 204, 0, .22);

        const shuffle = a => [...a].sort(() => Math.random() - .5);
        const wait = ms => new Promise(r => setTimeout(r, ms));

        function homeItems() {
            const all = [...DATA.games, ...DATA.software, ...DATA.hardware, ...DATA.prototypes];
            return shuffle(all).slice(0, 6);

        /* ══════════════════════════════
           CARD LAYOUT
        ══════════════════════════════ */
        function getCardDims() {
            const vw = innerWidth, vh = innerHeight;
            const yTop = 120;
            const yBot = vh - 72;
            const available = yBot - yTop;
            const GAP = 14;
            let ch = Math.floor((available - 2 * GAP) / 3);
            ch = Math.max(220, Math.min(ch, 370));
            const cw = Math.round(ch / 1.45);
            return { cw, ch, gap: GAP, yTop };
        }

        function layoutPositions(n, { cw, ch, gap, yTop }) {
            const vw = innerWidth, vh = innerHeight;
            const SIDE_PAD = 14;
            const leftX = SIDE_PAD;
            const rightX = vw - cw - SIDE_PAD;
            const pos = [];
            const perCol = 3;
            const totalH = perCol * ch + (perCol - 1) * gap;
            const yStart = yTop + ((vh - 72 - yTop) - totalH) / 2;
            for (let i = 0; i < n; i++) {
                const side = i % 2;
                const row = Math.floor(i / 2);
                pos.push({
                    x: side === 0 ? leftX : rightX,
                    y: Math.round(yStart + row * (ch + gap))
                });
            }
            return pos;
        }

        /* ══════════════════════════════
           CARDS ENGINE
        ══════════════════════════════ */
        const cardLayer = document.getElementById('cards');
        let liveCards = [], openCard = null;

        function clearCards(cb) {
            liveCards.forEach(el => {
                el.style.transition = 'opacity .22s ease, transform .22s ease';
                el.style.opacity = '0';
                el.style.transform = 'translateY(18px) scale(.94)';
            });
            setTimeout(() => { cardLayer.innerHTML = ''; liveCards = []; openCard = null; cb && cb(); }, 280);
        }

        function dealCards(items) {
            const dims = getCardDims();
            const positions = layoutPositions(Math.min(items.length, 6), dims);
            const { cw, ch } = dims;
            const vw = innerWidth, vh = innerHeight;
            const deckX = vw / 2 - cw / 2;
            const deckY = vh + 20;

            items.slice(0, 6).forEach((item, i) => {
                const el = document.createElement('div');
                el.className = 'gc';
                el.dataset.i = i;

                const thumbH = Math.round(ch * 0.46);
                const lh = (item.lk || []).map(l =>
                    `<a class="cla" href="${l.u}" target="_blank" rel="noopener">${l.l}</a>`).join('');

                el.innerHTML = `<button class="cbtn">✕</button>
                    <img class="th" src="${item.img}" alt="${item.t}" loading="lazy" decoding="async" style="height:${thumbH}px">
                    <div class="ci"><h3>${item.t}</h3><p>${item.d}</p><div class="clk">${lh}</div></div>`;

                const angle = (Math.random() - .5) * 12;
                /* PERF: Use translate3d for initial position — triggers GPU layer immediately.
                   Don't use left/top for the starting offscreen position; instead use transform
                   and then switch to actual position on deal. */
                el.style.cssText = `left:${deckX}px;top:${deckY}px;width:${cw}px;opacity:0;transform:translate3d(0,0,0) scale(.78) rotate(${angle}deg);z-index:${10 + i};transition:none;`;

                cardLayer.appendChild(el);
                liveCards.push(el);

                el.querySelector('.cbtn').addEventListener('click', e => { e.stopPropagation(); collapseCard(el); });
                el.addEventListener('click', e => {
                    if (e.target.closest('.cla')) return;
                    if (el.classList.contains('xp')) return;
                    expandCard(el, i, positions, dims);
                });

                setTimeout(() => {
                    /* PERF: Animate with transform only during deal (no left/top change).
                       Set final left/top first with no transition, then animate the transform. */
                    el.style.transition = 'none';
                    el.style.left = positions[i].x + 'px';
                    el.style.top = positions[i].y + 'px';
                    /* Force reflow once to apply the new position */
                    el.getBoundingClientRect();
                    el.style.transition = `opacity .22s ease, transform .36s cubic-bezier(.22,.9,.36,1)`;
                    el.style.opacity = '1';
                    el.style.transform = `translate3d(0,0,0) rotate(${(Math.random() - .5) * 1.5}deg) scale(1)`;
                }, i * 65);
            });

            /* Lock to hover-only transitions after deal settles */
            setTimeout(() => {
                liveCards.forEach(el => {
                    if (!el.classList.contains('xp'))
                        el.style.transition = 'box-shadow .3s, border-color .3s, transform .3s cubic-bezier(.34,1.2,.64,1)';
                });
            }, 6 * 65 + 420);
        }

        function expandCard(el, idx, positions, dims) {
            const vw = innerWidth, vh = innerHeight;
            const expW = Math.min(500, vw - 32);
            const expH = Math.min(500, vh - 100);
            const tx = Math.round((vw - expW) / 2);
            const ty = Math.round((vh - expH) / 2);

            el.dataset.ox = el.style.left;
            el.dataset.oy = el.style.top;

            if (openCard && openCard !== el) collapseCard(openCard, true);
            openCard = el;

            /* PERF: Animate using transform instead of left/top to completely eliminate layout thrashing for position. */
            el.style.transition = `width .46s cubic-bezier(.34,1.1,.64,1), transform .46s cubic-bezier(.34,1.1,.64,1), opacity .3s, box-shadow .35s, border-color .35s, border-radius .4s, background .4s`;

            const dx = tx - parseFloat(el.dataset.ox);
            const dy = ty - parseFloat(el.dataset.oy);

            el.style.width = expW + 'px';
            el.style.transform = `translate3d(${dx}px, ${dy}px, 0) rotate(0deg) scale(1)`;
            el.style.zIndex = 300;
            el.classList.add('xp');
        }

        function collapseCard(el, fast = false) {
            if (!el) return;
            const d = fast ? '.32s' : '.44s';
            /* PERF: Animate using transform instead of left/top */
            el.style.transition = `width ${d} cubic-bezier(.34,1.1,.64,1), transform ${d} cubic-bezier(.34,1.1,.64,1), box-shadow .3s, border-color .3s, border-radius .4s, background .4s`;

            el.style.width = getCardDims().cw + 'px';
            el.style.transform = `translate3d(0,0,0) rotate(${(Math.random() - .5) * 1.2}deg) scale(1)`;
            el.style.zIndex = 10 + parseInt(el.dataset.i || 0);
            el.classList.remove('xp');
            if (openCard === el) openCard = null;
            setTimeout(() => {
                if (!el.classList.contains('xp'))
                    el.style.transition = 'box-shadow .3s, border-color .3s, transform .3s cubic-bezier(.34,1.2,.64,1)';
            }, 460);
        }

        document.addEventListener('keydown', e => { if (e.key === 'Escape' && openCard) collapseCard(openCard); });

        document.addEventListener('click', e => {
            if (openCard && !e.target.closest('.gc')) {
                collapseCard(openCard);
            }
        });

        /* ══════════════════════════════
           PILL NAV
        ══════════════════════════════ */
        const pn = document.getElementById('pill-nav');
        const pt = document.getElementById('pill-thumb');
        const ptabs = document.querySelectorAll('.ptab');
        const navWrap = document.getElementById('nav-wrap');
        const catlabel = document.getElementById('catlabel');
        const identity = document.getElementById('identity');
        const cpanel = document.getElementById('cpanel');

        let activeCat = 'home';
        let dragging = false, dragLastTab = null, dragOriginTab = null;

        function tabGeom(tab) {
            const nr = pn.getBoundingClientRect();
            const tr = tab.getBoundingClientRect();
            return { l: tr.left - nr.left, w: tr.width };
        }

        function snapThumb(tab, animate = true) {
            const g = tabGeom(tab);
            pt.style.transition = animate
                ? 'left .4s cubic-bezier(.34,1.56,.64,1), width .4s cubic-bezier(.34,1.56,.64,1)'
                : 'none';
            pt.style.left = g.l + 'px';
            pt.style.width = g.w + 'px';
        }

        function stretchThumb(fromTab, toTab) {
            const nr = pn.getBoundingClientRect();
            const fr = fromTab.getBoundingClientRect();
            const tr = toTab.getBoundingClientRect();
            const l = Math.min(fr.left, tr.left) - nr.left;
            const r = Math.max(fr.right, tr.right) - nr.left;
            pt.style.transition = 'none';
            pt.style.left = l + 'px';
            pt.style.width = (r - l) + 'px';
        }

        function switchCat(cat) {
            if (cat === activeCat) return;
            activeCat = cat;
            ptabs.forEach(t => t.classList.toggle('on', t.dataset.cat === cat));
            const onTab = document.querySelector('.ptab.on');
            if (onTab) snapThumb(onTab);

            identity.classList.toggle('vis', cat === 'home');
            cpanel.classList.toggle('vis', cat === 'contact');

            if (cat === 'home' || cat === 'contact') {
                catlabel.textContent = '';
                catlabel.classList.remove('sh');
            } else {
                catlabel.textContent = cat.charAt(0).toUpperCase() + cat.slice(1);
                catlabel.classList.add('sh');
            }

            clearCards(() => {
                if (cat === 'home') dealCards(homeItems());
                else if (cat !== 'contact') dealCards((DATA[cat] || []).slice(0, 6));
            });
        }

        let dragStartX = 0;

        pn.addEventListener('pointerdown', e => {
            dragging = true; dragLastTab = null;
            dragStartX = e.clientX;
            dragOriginTab = document.querySelector('.ptab.on') || ptabs[0];
            pn.setPointerCapture(e.pointerId);
        });

        pn.addEventListener('pointermove', e => {
            if (!dragging) return;
            const cx = e.clientX;
            if (Math.abs(cx - dragStartX) < 5) return;
            let best = null, bestD = Infinity;
            ptabs.forEach(tab => {
                const r = tab.getBoundingClientRect();
                const d = Math.abs(r.left + r.width / 2 - cx);
                if (d < bestD) { bestD = d; best = tab; }
            });
            if (best) {
                ptabs.forEach(t => t.classList.toggle('on', t === best));
                if (best === dragOriginTab) {
                    snapThumb(best, false);
                } else {
                    stretchThumb(dragOriginTab, best);
                }
                dragLastTab = best;
            }
        });

        pn.addEventListener('pointerup', e => {
            if (dragging) {
                const cx = e.clientX;
                if (Math.abs(cx - dragStartX) < 5) {
                    let clickedTab = null;
                    ptabs.forEach(tab => {
                        const r = tab.getBoundingClientRect();
                        if (cx >= r.left - 5 && cx <= r.right + 5) clickedTab = tab;
                    });
                    if (clickedTab) {
                        snapThumb(clickedTab, true);
                        switchCat(clickedTab.dataset.cat);
                    } else if (dragOriginTab) {
                        snapThumb(dragOriginTab, true);
                        ptabs.forEach(t => t.classList.toggle('on', t === dragOriginTab));
                    }
                } else if (dragLastTab) {
                    snapThumb(dragLastTab, true);
                    switchCat(dragLastTab.dataset.cat);
                }
            }
            dragging = false;
        });

        /* ══════════════════════════════
           PARALLAX — batched RAF, no per-event style writes
           PERF: The original read from e.clientX and immediately wrote to style.
           This can force mid-frame layout recalculations. Fixed by:
           1. Storing raw mouse values
           2. Writing all style updates in a single rAF callback
           3. Using transform3d always (keeps layers on GPU)
           4. Throttling to one rAF per frame (already done in original,
              but we also cap the mouse sensitivity for small screens)
        ══════════════════════════════ */
        const plSky = document.getElementById('pl-sky');
        const plMountains = document.getElementById('pl-mountains');
        const plLand = document.getElementById('pl-land');
        const plFence = document.getElementById('pl-fence');
        const plBench = document.getElementById('pl-bench');
        const plGirl = document.getElementById('pl-girl');
        const plClouds = document.getElementById('pl-clouds-layer');
        const dynLight = document.getElementById('dynamic-light');

        /* PERF: Keep mx/my as raw pixel deltas from center, not ratios.
           We multiply by strength factor once in the rAF write, not on every move. */
        let pmx = 0, pmy = 0, prafPending = false;

        document.addEventListener('mousemove', e => {
            pmx = (e.clientX / innerWidth - .5) * 2;
            pmy = (e.clientY / innerHeight - .5) * 2;
            if (!prafPending) {
                prafPending = true;
                requestAnimationFrame(writeParallax);
            }
        }, { passive: true });

        function writeParallax() {
            prafPending = false;
            dynLight && (dynLight.style.transform = `translate3d(${pmx * 40}px,${pmy * 40}px,0)`);
        }

        /* ══════════════════════════════
           CONTACT FORM
        ══════════════════════════════ */
        document.getElementById('cf').addEventListener('submit', e => {
            e.preventDefault();
            const fd = new FormData(e.target);
            window.location.href = `mailto:ajnimator@gmail.com?subject=Portfolio message from ${fd.get('name')}&body=${fd.get('message')}`;
        });

        /* ══════════════════════════════
           INTRO SEQUENCE
        ══════════════════════════════ */
        const WORDS = ['Hello', 'Hola', 'Bonjour', 'مرحبا', 'こんにちは', 'Привет', 'Ciao', '你好', '안녕', 'Hallo', 'Olá'];
        const overlay = document.getElementById('intro-overlay');
        const namasteEl = document.getElementById('namaste');
        const introPill = document.getElementById('intro-pill');
        const skipHint = document.getElementById('skip-hint');
        const replayBtn = document.getElementById('replay-intro-btn');

        /* ── Double-tap / double-click to skip intro ── */
        let introRunning = false;
        let introSkipResolver = null;
        let lastTapTime = 0;

        function skipIntro() {
            introRunning = false;          /* signal bail-out to all guards */
            if (introSkipResolver) {
                introSkipResolver();       /* resolve the current await instantly */
                introSkipResolver = null;
            }
        }

        function handleDoubleTap(e) {
            if (!introRunning) return;
            const now = Date.now();
            if (now - lastTapTime < 350) {
                skipIntro();
            }
            lastTapTime = now;
        }

        /* Desktop: dblclick is already a confirmed double-click — call skipIntro directly */
        document.addEventListener('dblclick', e => {
            if (introRunning) skipIntro();
        });
        /* Mobile/touch: touchend fires on every tap so we need manual 350ms detection */
        document.addEventListener('touchend', handleDoubleTap, { passive: true });

        /* Promise that resolves immediately on skip or after ms delay */
        function skippableWait(ms) {
            return new Promise(res => {
                const t = setTimeout(res, ms);
                introSkipResolver = () => { clearTimeout(t); res(); };
            });
        }

        /* ── Replay button ── */
        replayBtn.addEventListener('click', () => {
            replayBtn.classList.remove('rib-vis');
            setTimeout(() => { replayBtn.style.display = 'none'; }, 420);
            /* Reset and replay */
            clearCards(() => {});
            navWrap.classList.remove('vis');
            identity.classList.remove('vis');
            cpanel.classList.remove('vis');
            catlabel.classList.remove('sh');
            catlabel.textContent = '';
            activeCat = 'home';
            ptabs.forEach(t => t.classList.toggle('on', t.dataset.cat === 'home'));
            const homeTab = document.querySelector('.ptab[data-cat="home"]');
            if (homeTab) snapThumb(homeTab, false);
            setTimeout(runIntro, 80);
        });

        async function runIntro() {
            /* Reset state */
            introRunning = true;
            introSkipResolver = null;
            lastTapTime = 0;

            /* Reset DOM for replays */
            overlay.style.display = '';
            overlay.style.backgroundColor = '#000';
            overlay.style.pointerEvents = 'none';
            namasteEl.style.opacity = '1';
            namasteEl.style.color = '#ffeb3b';
            namasteEl.textContent = 'Hello';
            introPill.style.display = '';
            introPill.style.opacity = '0';
            introPill.style.width = '12px';
            introPill.style.height = '44px';
            introPill.style.borderRadius = '100px';
            introPill.style.top = '50%';
            introPill.style.transform = 'translate(-50%, -50%)';
            introPill.innerHTML = '';

            /* Show double-tap hint after a short delay */
            setTimeout(() => { if (introRunning) skipHint.classList.add('sh-vis'); }, 600);

            /* Phase 1: Rapid Words */
            for (let i = 0; i < WORDS.length; i++) {
                namasteEl.textContent = WORDS[i];
                await skippableWait(120);
                if (!introRunning) { finishIntro(); return; }
            }
            namasteEl.textContent = 'Namaste';
            await skippableWait(400);
            if (!introRunning) { finishIntro(); return; }

            /* Phase 2 & 3: Yellow becomes white and background fades simultaneously */
            namasteEl.style.color = '#fff';
            overlay.style.backgroundColor = 'transparent';
            await skippableWait(900);
            if (!introRunning) { finishIntro(); return; }

            /* Phase 4: Glass pill expands */
            const nmR = namasteEl.getBoundingClientRect();
            introPill.style.transition = 'width .55s cubic-bezier(.34,1.2,.64,1), height .55s cubic-bezier(.34,1.2,.64,1), opacity .4s ease, border-radius .5s ease';
            introPill.style.opacity = '1';
            await skippableWait(30);
            introPill.style.width = (nmR.width + 64) + 'px';
            introPill.style.height = (nmR.height + 32) + 'px';
            introPill.style.borderRadius = '32px';
            await skippableWait(600);
            if (!introRunning) { finishIntro(); return; }

            /* Fade namaste out and remove overlay */
            namasteEl.style.opacity = '0';
            await skippableWait(400);
            overlay.style.display = 'none';

            /* Phase 5: Pill shrinks to text-pill */
            introPill.style.transition = 'width .65s cubic-bezier(.34,1.1,.64,1), height .5s cubic-bezier(.34,1.1,.64,1), border-radius .5s ease';
            introPill.style.width = 'min(480px,82vw)';
            introPill.style.height = '106px';
            introPill.style.borderRadius = '24px';
            await skippableWait(700);
            if (!introRunning) { finishIntro(); return; }

            introPill.innerHTML = `<div id="ipt-inner">
                <div id="ipt-name"></div>
                <div id="ipt-sub"></div>
            </div>`;
            const iptInner = document.getElementById('ipt-inner');
            const iptName = document.getElementById('ipt-name');
            const iptSub = document.getElementById('ipt-sub');
            iptInner.style.opacity = '1';

            await new Promise(res => {
                const full = "I'm Arjun Singh.";
                const pre = "I'm ";
                const name = "Arjun Singh";
                const post = ".";
                let i = 0;
                introSkipResolver = () => { i = full.length - 1; };
                const iv = setInterval(() => {
                    i++;
                    const txt = full.slice(0, i);
                    if (i <= pre.length) {
                        iptName.textContent = txt;
                    } else if (i <= pre.length + name.length) {
                        iptName.innerHTML = `${pre}<span class="nm">${txt.slice(pre.length)}</span>`;
                    } else {
                        iptName.innerHTML = `${pre}<span class="nm">${name}</span>${post}`;
                    }
                    if (i >= full.length) { clearInterval(iv); introSkipResolver = null; res(); }
                }, 40);
            });

            await skippableWait(60);
            await new Promise(res => {
                const full = "And this is a showcase of games, softwares, and other things I have created over the time.";
                let i = 0;
                introSkipResolver = () => { i = full.length - 1; };
                const iv = setInterval(() => {
                    iptSub.textContent = full.slice(0, ++i);
                    if (i >= full.length) { clearInterval(iv); introSkipResolver = null; res(); }
                }, 22);
            });
            await skippableWait(950);
            if (!introRunning) { finishIntro(); return; }

            /* Phase 6: Pill rises to identity position */
            const idH1 = document.querySelector('#identity h1');
            const idTl = document.querySelector('#identity .tl');
            idH1.innerHTML = `I'm <span class="nm">Arjun Singh</span>.`;
            idTl.textContent = "And this is a showcase of games, softwares, and other things I have created over the time.";

            introPill.style.transition = 'top .88s cubic-bezier(.4,0,.2,1), transform .88s cubic-bezier(.4,0,.2,1)';
            introPill.style.top = '1.6rem';
            introPill.style.transform = 'translate(-50%, 0)';
            await skippableWait(900);

            iptInner.style.opacity = '0';
            await skippableWait(300);

            const navR = navWrap.getBoundingClientRect();
            introPill.style.transition = [
                'width .65s cubic-bezier(.34,1.1,.64,1)',
                'height .52s cubic-bezier(.34,1.1,.64,1)',
                'top .88s cubic-bezier(.34,1.1,.64,1)',
                'opacity .5s ease',
                'border-radius .5s ease'
            ].join(',');
            introPill.style.top = navR.top + 'px';
            introPill.style.width = navR.width + 'px';
            introPill.style.height = navR.height + 'px';
            introPill.style.borderRadius = '100px';

            identity.classList.add('vis');
            await skippableWait(900);

            finishIntro();
        }

        function finishIntro() {
            introRunning = false;
            introSkipResolver = null;
            skipHint.classList.remove('sh-vis');

            overlay.style.display = 'none';
            introPill.style.opacity = '0';
            navWrap.classList.add('vis');
            identity.classList.add('vis');
            const firstTab = document.querySelector('.ptab.on');
            if (firstTab) setTimeout(() => snapThumb(firstTab, false), 40);

            dealCards(homeItems());
            activeCat = 'home';
            setTimeout(() => {
                introPill.style.display = 'none';
                replayBtn.style.display = 'flex';
                requestAnimationFrame(() => replayBtn.classList.add('rib-vis'));
            }, 600);
        }

        document.fonts.ready.then(() => setTimeout(runIntro, 200));
    </script>
</body>
